name: "SRNE Invertor Modbus"
description: "Citire Modbus RTU pentru invertor SRNE/Easun (HF2450S80H, All-in-one solar charger inverter). Publica date in MQTT cu HA auto-discovery."
version: "2.0.0"
slug: "srne_invertor"
init: false
arch:
  - amd64
  - aarch64
uart: true
apparmor: false
devices:
  - /dev/ttyUSB0
  - /dev/ttyUSB1
  - /dev/ttyUSB2
homeassistant_api: false
hassio_api: false
ingress: false
map:
  - config:rw
options:
  serial_port: "/dev/ttyUSB1"
  modbus_address: 1
  poll_interval: 30
  mqtt_host: "core-mosquitto"
  mqtt_port: 1883
  mqtt_user: "mqtt_local"
  mqtt_password: "mqtt2026vidra"
  mqtt_topic_prefix: "srne"
  ha_discovery_prefix: "homeassistant"
  log_level: "INFO"
schema:
  serial_port: str
  modbus_address: int(1,247)
  poll_interval: int(10,300)
  mqtt_host: str
  mqtt_port: int(1,65535)
  mqtt_user: str
  mqtt_password: str
  mqtt_topic_prefix: str
  ha_discovery_prefix: str
  log_level: list(DEBUG|INFO|WARNING|ERROR)
